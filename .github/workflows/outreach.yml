name: Daily Studio Outreach

on:
  schedule:
    - cron: '0 9 * * *'   # 9am UTC daily
  workflow_dispatch:        # allow manual trigger from GitHub UI

permissions:
  contents: write           # needed to commit the updated log

jobs:
  outreach:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check outreach status
        id: status
        run: |
          LOG=scripts/outreach_log.txt

          if grep -q "All studios contacted" "$LOG"; then
            echo "complete=true" >> $GITHUB_OUTPUT
            echo "All studios have already been contacted — skipping."
          else
            OFFSET=$(grep "Next run:" "$LOG" | tail -1 | grep -oE '\-\-offset=[0-9]+' | grep -oE '[0-9]+')
            if [ -z "$OFFSET" ]; then
              OFFSET=0
            fi
            echo "complete=false" >> $GITHUB_OUTPUT
            echo "offset=$OFFSET" >> $GITHUB_OUTPUT
            echo "Next offset: $OFFSET"
          fi

      - name: Run outreach batch
        if: steps.status.outputs.complete != 'true'
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: npx tsx scripts/outreach.ts --offset=${{ steps.status.outputs.offset }}

      - name: Commit updated log
        if: steps.status.outputs.complete != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/outreach_log.txt
          git diff --cached --quiet || git commit -m "outreach: batch at offset ${{ steps.status.outputs.offset }}"
          git push
